---
layout: wrapper
title: Podcasts
description: Recommended listening.
excerpt: Recommended listening.
permalink: /podcasts/
---
<div class="card-deck books">
    {% for item in site.data.podcasts.docs %}
    <div class="card">
        <div class="card-body">
            <a href="{{ item.url }}"><img class="card-img-top" src="{{ site.url }}/img/podcasts/{{ item.img }}" alt="{{ item.title }}"></a>
            <h5 class="h5"><a href="{{ item.url }}">{{ item.title }}</a></h5>
        </div>
    </div>
    {% endfor %}
</div>
