---
layout: works
---
{% include header.html %}
{% include nav.html %}
<main>
    <div class="jumbotron">
        <div class="container">
            <div class="row">
                <div class="col-sm-12">
                    <h1 class="display-4">{{ page.title }}</h1>
                    {% if page.excerpt %}
                    <p class="lead">{{ page.excerpt }}</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-sm-3">
                {% if page.img %}
                <a href="{{ page.website }}"><img src="{{ site.baseurl }}/img/work/{{ page.img }}" alt="{{ page.title }} logo" class="rounded"></a>
                {% endif %}
            </div>
            <div class="col-sm-9">
                {{ content }}
                <p><a href="{{ page.website }}">Visit {{ page.title }}</a></p>
            </div>
        </div>
    </div>
</main>
{% include analytics.html %}
{% include footer.html %}
