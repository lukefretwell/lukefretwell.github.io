---
layout: cv
---
{% include header.html %}
{% include nav.html %}
<main>
  {% include jumbotron.html %}
  {% capture body %}
    <div class="mb-5">
      {% if page.download-link %}
        <a
          class="btn btn-primary btn-lg mt-3 shadow border"
          href="{{ page.download-link }}"
          role="button">{{ page.download-text }}</a>
      {% endif %}
    </div>
    <section>
      {{ content }}
    </section>
  {% endcapture %}
  {% include content-wrapper.html body=body %}
</main>
{% include footer.html %}
