---
layout: wrapper

---
<div class="card-deck books">
    {% for item in site.data.podcasts.docs %}
    <div class="card">
        <div class="card-body">
            <a href="{{ item.url }}">
            	<img class="card-img-top" src="{{ site.baseurl }}/img/podcasts/{{ item.img }}" alt="{{ item.title }} logo">
                <h2 class="h5">{{ item.title }}</h2>
            </a>
        </div>
    </div>
    {% endfor %}
</div>
