<div class="card-grid">
  {% for item in site.data.reading.docs limit: include.limit %}
    <wa-card>
      <h2>
        <a href="{{ site.baseurl }}{{ item.url }}" class="card-link">
          {{ item.title }}
        </a>
      </h2>
      <p class="card-meta">{{ item.author }}</p>
    </wa-card>
  {% endfor %}
</div>
