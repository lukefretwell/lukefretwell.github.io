<div class="card-grid press-cards">
  {% assign heading = include.heading | default: "h3" %}
  {% for item in site.data.press.docs limit: include.limit %}
    <wa-card>
      <{{ heading }}>
        <a
          href="{{ item.url }}"
          class="card-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="{{ item.title }} (opens in new tab)">
          {{ item.title }} <i class="fa-solid fa-arrow-up-right-from-square fa-xs" aria-hidden="true"></i>
        </a>
      </{{ heading }}>
      <p class="card-meta">{{ item.source }}</p>
    </wa-card>
  {% endfor %}
</div>
