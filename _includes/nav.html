<nav class="site-nav" aria-label="Primary navigation">
  <a class="site-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
  <div class="site-nav-right">
    <ul class="site-nav-links" id="site-nav-links">
      {% for item in site.data.nav.docs %}
        {% if item.url %}
          <li>
            <a href="{{ site.baseurl }}{{ item.url }}" {% if item.url == page.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
          </li>
        {% endif %}
      {% endfor %}
      <li>
        <div class="dark-toggle" role="button" tabindex="0" aria-label="Toggle dark mode"></div>
      </li>
    </ul>
    <button class="site-nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav-links">
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
    </button>
  </div>
</nav>
<script>
  (function () {
    var toggle = document.querySelector('.site-nav-toggle');
    var links = document.getElementById('site-nav-links');
    if (!toggle || !links) return;
    toggle.addEventListener('click', function () {
      var open = links.classList.toggle('open');
      toggle.setAttribute('aria-expanded', String(open));
    });
  })();
</script>
