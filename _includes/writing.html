<div class="card-grid">
  {% if include.limit %}
    {% assign limitVar = include.limit | plus: 0 %}
  {% endif %}
  {% for item in site.data.writing.docs limit: limitVar %}
    <wa-card>
      <h2>
        <a
          href="{{ item.url }}"
          class="card-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="{{ item.title }} (opens in new tab)">
          {{ item.title }} <i class="fa-solid fa-arrow-up-right-from-square fa-xs" aria-hidden="true"></i>
        </a>
      </h2>
      <p class="card-meta">{{ item.description }}</p>
    </wa-card>
  {% endfor %}
</div>
