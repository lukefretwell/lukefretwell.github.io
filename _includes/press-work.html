{% if page.press %}
  {% for press in page.press %}
    <wa-card>
      <h2>
        <a
          href="{{ press.link }}"
          class="card-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="{{ press.title }} (opens in new tab)">{{ press.title }} <i class="fa-solid fa-arrow-up-right-from-square fa-xs" aria-hidden="true"></i></a>
      </h2>
      <p class="card-meta">{{ press.source }}</p>
    </wa-card>
  {% endfor %}
{% endif %}
