{% if page.img %}
  <figure>
    <img
      src="{{ site.baseurl }}/assets/img/{{ page.img-path | default: site.img-path }}/{{ page.img }}"
      alt="{{ page.img-alt | default: "" }}"
      loading="lazy"
      class="border">
    {% if page.img-caption %}
      <figcaption>
        <p>
          <small>
            {% if page.img-link %}
              <a href="{{ site.baseurl }}{{ page.img-link }}">
            {% endif %}
            {{ page.img-caption }}
            {% if page.img-link %}
              </a>
            {% endif %}
          </small>
        </p>
      </figcaption>
    {% endif %}
  </figure>
{% endif %}
